services:
  # SERVER

  redis:
    container_name: redis
    image: "bitnami/redis:latest"
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=redispassword

  php:
    container_name: php
    build: 
      context: ./php/8.4
      dockerfile: dockerfile
    dns:
      - 8.8.8.8
      - 172.19.0.1
    volumes:
      - ${WEB_VOLUME}:/var/www/
      - ${WEB_VOLUME}:/var/www/:cached
    links:
      - mysql
      - mongo
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  nodejs:
    container_name: nodejs
    build:
      context: ./node
      dockerfile: Dockerfile
    volumes:
      - ${NODE_VOLUME}:/var/www/node
      - node_modules:/var/www/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"

    command: sh -c "node -v && tail -f /dev/null"

    tty: true

  # node:
  #   image: node:20-alpine
  #   container_name: node
  #   working_dir: /var/www
  #   volumes:
  #     - ${WEB_VOLUME}:/var/www
  #   command: sh -c "node -v && tail -f /dev/null"
  #   networks:
  #     - app-network
    
  nginx:
    restart: always
    build: ./nginx
    container_name: nginx
    dns:
      - 8.8.8.8
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "8085:8085"
    volumes:
      - ${WEB_VOLUME}:/var/www/
      - ./nginx/sites-enabled/:/etc/nginx/sites-enabled/
      - /var/log/nginx/:/etc/nginx/logs/
      - /tmp/:/tmp/
      - /etc/localtime:/etc/localtime:ro
    links:
      - mysql
      - redis
      - mongo
      - php
      - nodejs
    extra_hosts:
      - "local.psu.devel:172.19.0.1"
      - "local.sekanca.devel:172.19.0.1"
      - "local.sekanca-statis.devel:172.19.0.1"

  # DATABASES

  mysql:
    container_name: mysql
    image: mariadb:10.6
    command: --sql_mode="NO_ENGINE_SUBSTITUTION" --character-set-server=utf8 --collation-server=utf8_unicode_ci --default-authentication-plugin=mysql_native_password
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ${MYSQL_BACKUP}:/home/backup

  # mysql:
  #   container_name: mysql
  #   image: mysql:8.0
  #   command: --sql_mode="NO_ENGINE_SUBSTITUTION" --character-set-server=utf8 --collation-server=utf8_unicode_ci --default-authentication-plugin=mysql_native_password
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - ${MYSQL_BACKUP}:/home/backup

  mongo:
    container_name: mongo
    image: mongo
    environment: 
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - ~/mongo/data:/data/db
    ports:
      - "27017:27017"

  pgsql:
    container_name: pgsql
    image: postgres:12.0-alpine
    volumes:
    - ~/pgs/data:/data/db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    ports:
      - 5432:5432


volumes:
    node_modules: